<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>flux — forex-driven cellular automata</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f}
canvas{display:block;touch-action:manipulation}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ─── CONFIG ───
const C = {
  cols: 60,
  rows: 45,
  updateInterval: 200,
  aliveGlow: 10,
  dyingGlow: 6,
  dotSpacing: 24,
  apiUrl: 'https://api.frankfurter.app/latest?from=EUR&to=USD,GBP,JPY',
  apiInterval: 30000,
  warmupSteps: 25,
  initialDensity: 0.28,
  minInterval: 80,
  maxInterval: 500,
};

// ─── PALETTE (Circuit preset, adapted for forex) ───
const P = {
  bg: '#0a0a0f',
  aliveUp: '#00e676',
  aliveDown: '#ff1744',
  aliveNeutral: '#b2ff59',
  dying: '#ff1744',
  gridLine: 'rgba(41,121,255,0.08)',
  dotColor: '#2979ff',
  dotAlpha: 0.07,
};

// ─── CANVAS ───
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cellSize, ox, oy;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cellSize = Math.floor(Math.min((W - 40) / C.cols, (H - 40) / C.rows));
  ox = Math.floor((W - cellSize * C.cols) / 2);
  oy = Math.floor((H - cellSize * C.rows) / 2);
}
resize();
window.addEventListener('resize', resize);

// ─── FOREX ───
let rateDir = 0;
let volatility = 0.5;
let lastRates = { USD: null, GBP: null, JPY: null };
let ratesDisplay = { USD: '--', GBP: '--', JPY: '--' };

async function fetchForex() {
  try {
    const res = await fetch(C.apiUrl);
    const data = await res.json();
    const r = data.rates;
    let dirSum = 0, volSum = 0, count = 0;
    for (const ccy of ['USD', 'GBP', 'JPY']) {
      if (r[ccy]) {
        ratesDisplay[ccy] = r[ccy].toFixed(4);
        if (lastRates[ccy] !== null) {
          const chg = (r[ccy] - lastRates[ccy]) / lastRates[ccy];
          dirSum += Math.sign(chg);
          volSum += Math.abs(chg) * 200;
        }
        lastRates[ccy] = r[ccy];
        count++;
      }
    }
    if (count) {
      rateDir = Math.sign(dirSum);
      volatility = Math.min(1, volSum / count);
      // Update interval based on volatility
      C.updateInterval = Math.round(C.maxInterval - volatility * (C.maxInterval - C.minInterval));
    }
  } catch(e) { /* keep defaults */ }
}
fetchForex();
setInterval(fetchForex, C.apiInterval);

// ─── GRID ───
let grid = [];
let dying = new Set();
let running = true;

function initGrid(density) {
  grid = [];
  for (let y = 0; y < C.rows; y++) {
    grid[y] = [];
    for (let x = 0; x < C.cols; x++)
      grid[y][x] = Math.random() < (density || C.initialDensity) ? 1 : 0;
  }
  dying.clear();
}

function neighbors(g, x, y) {
  let n = 0;
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++) {
      if (dx === 0 && dy === 0) continue;
      n += g[(y + dy + C.rows) % C.rows][(x + dx + C.cols) % C.cols];
    }
  return n;
}

function step() {
  const ng = [];
  const nd = new Set();
  for (let y = 0; y < C.rows; y++) {
    ng[y] = [];
    for (let x = 0; x < C.cols; x++) {
      const n = neighbors(grid, x, y);
      const a = grid[y][x];
      if (a && (n < 2 || n > 3)) { ng[y][x] = 0; nd.add(x+','+y); }
      else if (!a && n === 3) ng[y][x] = 1;
      else ng[y][x] = a;
    }
  }
  grid = ng;
  dying = nd;
}

// ─── DRAW ───
function draw() {
  ctx.fillStyle = P.bg;
  ctx.fillRect(0, 0, W, H);

  // Dot grid background
  ctx.fillStyle = P.dotColor;
  ctx.globalAlpha = P.dotAlpha;
  for (let x = 0; x < W; x += C.dotSpacing)
    for (let y = 0; y < H; y += C.dotSpacing)
      ctx.fillRect(x, y, 1, 1);
  ctx.globalAlpha = 1;

  const s = cellSize;
  const gap = 1;

  // Grid outline
  ctx.strokeStyle = P.gridLine;
  ctx.lineWidth = 0.5;
  ctx.strokeRect(ox - 0.5, oy - 0.5, s * C.cols + 1, s * C.rows + 1);

  // Grid lines
  for (let x = 0; x <= C.cols; x++) {
    ctx.beginPath(); ctx.moveTo(ox + x * s, oy); ctx.lineTo(ox + x * s, oy + C.rows * s); ctx.stroke();
  }
  for (let y = 0; y <= C.rows; y++) {
    ctx.beginPath(); ctx.moveTo(ox, oy + y * s); ctx.lineTo(ox + C.cols * s, oy + y * s); ctx.stroke();
  }

  // Cells
  const aliveColor = rateDir > 0 ? P.aliveUp : rateDir < 0 ? P.aliveDown : P.aliveNeutral;

  for (let y = 0; y < C.rows; y++) {
    for (let x = 0; x < C.cols; x++) {
      if (grid[y][x]) {
        const px = ox + x * s + gap, py = oy + y * s + gap;
        const sz = s - gap * 2;
        ctx.shadowColor = aliveColor;
        ctx.shadowBlur = C.aliveGlow;
        ctx.fillStyle = aliveColor;
        ctx.fillRect(px, py, sz, sz);
        ctx.shadowBlur = 0;
      } else if (dying.has(x+','+y)) {
        const px = ox + x * s + gap, py = oy + y * s + gap;
        const sz = s - gap * 2;
        ctx.shadowColor = P.dying;
        ctx.shadowBlur = C.dyingGlow;
        ctx.fillStyle = P.dying;
        ctx.globalAlpha = 0.4;
        ctx.fillRect(px, py, sz, sz);
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }
    }
  }

  // Status bar — rates at bottom
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px -apple-system, BlinkMacSystemFont, sans-serif';
  ctx.textAlign = 'center';
  const dirSymbol = running ? (rateDir > 0 ? '\u2191' : rateDir < 0 ? '\u2193' : '\u2192') : '\u23F8';
  ctx.fillText(
    'EUR/USD ' + ratesDisplay.USD + '  EUR/GBP ' + ratesDisplay.GBP + '  EUR/JPY ' + ratesDisplay.JPY + '  ' + dirSymbol,
    W / 2, H - 16
  );

  // Description top-left
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText('Forex rates shape a living circuit — tap cells or tap empty to pause', 16, 20);
}

// ─── LOOP ───
let lastUpdate = 0;

function tick(ts) {
  if (running && ts - lastUpdate > C.updateInterval) {
    step();
    lastUpdate = ts;
  }
  draw();
  requestAnimationFrame(tick);
}

// ─── WARMUP ───
initGrid(C.initialDensity);
for (let i = 0; i < C.warmupSteps; i++) step();

// ─── INTERACTION ───
let guard = false;

function handlePointer(cx, cy) {
  if (guard) return;
  guard = true;
  setTimeout(() => { guard = false; }, 250);

  const gx = Math.floor((cx - ox) / cellSize);
  const gy = Math.floor((cy - oy) / cellSize);

  if (gx >= 0 && gx < C.cols && gy >= 0 && gy < C.rows) {
    grid[gy][gx] = grid[gy][gx] ? 0 : 1;
  } else {
    running = !running;
    if (running) lastUpdate = performance.now();
  }
}

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  handlePointer(e.clientX - r.left, e.clientY - r.top);
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const r = canvas.getBoundingClientRect();
  handlePointer(t.clientX - r.left, t.clientY - r.top);
}, { passive: false });

// ─── START ───
lastUpdate = performance.now();
tick(lastUpdate);
</script>
</body>
</html>
